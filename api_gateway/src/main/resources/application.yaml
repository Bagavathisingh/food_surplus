server:
  port: 8080

spring:
  application:
    name: api_gateway

  cloud:
    gateway:
      routes:
        - id: securityBackend
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: Food_service
          uri: http://localhost:8082
          predicates:
            - Path=/api/food/**

jwt:
  secret: ${JWT_SECRET}