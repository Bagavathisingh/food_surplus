server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: food-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/food/**

jwt:
  secret: ${JWT_SECRET}

api:
  gateway:
    key: ${API_GATE_WAY_KEY}