syntax = "proto3";

option java_multiple_files = true;

option java_package = "notificationClient";

service notificationClient{
  rpc sentNotification(notificationRequest)
    returns (notificationResponse);
}

message notificationRequest{
  string receiverEmail = 1;
  string title = 2;
  string message = 3;
}

message notificationResponse{
  bool success = 1;
  string response =2;
}